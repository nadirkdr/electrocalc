.av-ai{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#8b5cf6,#6366f1);display:grid;place-items:center;font-size:10px;font-weight:800;color:white;flex-shrink:0}
.av-user{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#3b82f6,#06b6d4);display:grid;place-items:center;font-size:12px;font-weight:800;color:white;flex-shrink:0}
.bbl-ai{background:rgba(30,41,59,.95);border:1px solid rgba(139,92,246,.18);border-radius:4px 16px 16px 16px;padding:11px 14px;color:#e2e8f0;font-size:13px;line-height:1.85;white-space:pre-wrap;max-width:84%}
.bbl-user{background:linear-gradient(135deg,#3b82f6,#6366f1);border-radius:16px 4px 16px 16px;padding:11px 14px;color:white;font-size:13px;line-height:1.7;max-width:84%}
.typing-dots{display:flex;gap:4px;padding:3px 0}
.dot{width:7px;height:7px;border-radius:50%;background:#8b5cf6;animation:pulse 1.2s ease-in-out infinite}
.suggestions{background:rgba(15,23,42,.5);border:1px solid rgba(148,163,184,.1);border-radius:14px;padding:13px}
.sug-title{font-size:11px;color:#94a3b8;margin-bottom:9px;font-weight:600}
.sug-grid{display:grid;gap:7px}
.sug-btn{background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.18);border-radius:10px;padding:9px 13px;color:#93c5fd;font-size:12px;cursor:pointer;text-align:left;transition:all .2s;font-family:inherit}
.sug-btn:hover{background:rgba(59,130,246,.14)}
.chat-composer{display:flex;gap:9px}
.chat-input{background:rgba(2,8,23,.6);border:1px solid rgba(59,130,246,.2);border-radius:13px;color:#e2e8f0;padding:11px 14px;outline:none;flex:1;font-size:13.5px}
.chat-input:focus{border-color:rgba(96,165,250,.7)}

.send-btn{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:white;display:grid;place-items:center;flex-shrink:0}
.send-btn:disabled{opacity:.5}
.ai-footer{text-align:center;font-size:10.5px;color:#334155;margin-top:4px}
footer{margin-top:18px;padding:10px 2px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;border-top:1px solid rgba(148,163,184,.07)}
.ft-l{font-size:12px;color:#475569}

<body>
<header>
  <div class="hdr">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div>
        <div class="logo-title">ElectroCalc Pro</div>
        <div class="logo-sub">Calculateurs Génie Électromécanique · Assistant IA</div>
      </div>
    </div>
    <div class="author-card">
      <div style="font-size:11px;color:#a78bfa;font-weight:700;margin-bottom:3px">Développé par</div>
      <div class="author-name">Kouadria Nadir</div>
      <div class="author-stars">★★★★★</div>
      <div class="author-role">Ingénieur en Électromécanique</div>
    </div>
  </div>
</header>
<div class="shell">
  <div class="summary" style="margin-top:18px">
    <div class="scard"><span class="val">8</span><span class="lbl">Calculateurs</span></div>
    <div class="scard"><span class="val">AI</span><span class="lbl">Assistant IA</span></div>
    <div class="scard"><span class="val">IEC</span><span class="lbl">Normes</span></div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="panel" id="panel"></div>
  <footer>
    <span class="ft-l">ElectroCalc Pro · Résultats approximatifs</span>
    <span class="ft-r">Kouadria Nadir · Ingénieur Électromécanicien</span>
  </footer>
</div>
<script>
var activeTab='motor', mode='engineer', loading=false;
var chatMsgs=[{role:'ai',text:'Bonjour! Je suis votre assistant en génie électromécanique. Posez-moi vos questions techniques.'}];
var SUGS=['Quel disjoncteur pour moteur 15kW?','Couple moteur 22kW 1450 tr/min','Section cable pour 50A moteur','Formule puissance triphasée'];

function fmt(v,d){d=d||2;return Number.isFinite(v)?new Intl.NumberFormat('fr-FR',{minimumFractionDigits:d,maximumFractionDigits:d}).format(v):'--';}
function pos(v){return Number.isFinite(v)&&v>0;}
function N(v){return Number.parseFloat(v);}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}

var TABS=[
  {id:'motor',   label:'Puissance Moteur',  color:'#3b82f6',icon:'⚡',help:'Puissance apparente, active et sortie pour moteurs mono/triphasés.'},
  {id:'torque',  label:'Couple',            color:'#8b5cf6',icon:'🔧',help:'Couple depuis puissance/vitesse ou force/rayon.'},
  {id:'3phase',  label:'Courant Triphasé',  color:'#06b6d4',icon:'🔌',help:'Courant nominal, tension phase, courant démarrage.'},
  {id:'breaker', label:'Disjoncteur',       color:'#f59e0b',icon:'🛡️',help:'Sélection disjoncteur et câble selon type de charge.'},
  {id:'air',     label:'Air Comprimé',      color:'#10b981',icon:'💨',help:'Puissance compresseur, réservoir, déplacement volumique.'},
  {id:'pump',    label:'Pompes',            color:'#f97316',icon:'💧',help:'Puissance hydraulique, arbre pompe, NPSH.'},
  {id:'convert', label:'Conversions',       color:'#ec4899',icon:'🔄',help:'Conversion rapide entre unités ingénierie.'},
  {id:'ai',      label:'Assistant IA',      color:'#a78bfa',icon:'🤖',help:'Assistant IA spécialisé en génie électromécanique.'},
];

var state={
  motor:{voltage:'',current:'',pf:'85',eff:'90',phases:'3'},
  torque:{type:'power',power:'',rpm:'',force:'',radius:''},
  '3phase':{power:'',voltage:'380',pf:'85',eff:'90'},
  breaker:{current:'',type:'motor'},
  air:{pressure:'',flow:'',pistons:'2',rpm:'900'},
  pump:{flow:'',head:'',eff:'75',density:'1000'},
  convert:{cat:'power',value:'',from:'kW',to:'HP'},
};

var UNITS={
  power:['W','kW','MW','HP','HP(m)','BTU/h'],
  torque:['N.m','kN.m','kgf.m','lbf.ft','lbf.in'],
  pressure:['Pa','kPa','MPa','bar','psi','atm','mmHg'],
  flow:['m3/s','m3/h','L/s','L/min','GPM'],
  length:['m','cm','mm','km','ft','in','yd'],
  temperature:['degC','degF','K'],
};

// CALC
function calcMotor(f){
  var V=N(f.voltage),I=N(f.current),PF=N(f.pf)/100,eff=N(f.eff)/100,ph=parseInt(f.phases);
  if(!pos(V)||!pos(I)||!(PF>0&&PF<=1)||!(eff>0&&eff<=1))return null;
  var S=ph===3?Math.sqrt(3)*V*I:V*I,P=S*PF,Pout=P*eff,Q=Math.sqrt(Math.max(S*S-P*P,0));
  return{S_kVA:S/1000,P_kW:P/1000,Pout_kW:Pout/1000,hp:Pout/746,Q_kVAR:Q/1000,pf:PF,eff:eff};
}
function calcTorque(f){
  if(f.type==='power'){var P=N(f.power),Nv=N(f.rpm);if(!pos(P)||!pos(Nv))return null;var T=9550*P/Nv;return{T_Nm:T,T_kgfm:T/9.80665};}
  var F=N(f.force),R=N(f.radius);if(!pos(F)||!pos(R))return null;var T=F*R;return{T_Nm:T,T_kgfm:T/9.80665};
}
function calc3Phase(f){
  var P=N(f.power),V=N(f.voltage),PF=N(f.pf)/100,eff=N(f.eff)/100;
  if(!pos(P)||!pos(V)||!(PF>0&&PF<=1)||!(eff>0&&eff<=1))return null;
  var I=(P*1000)/(Math.sqrt(3)*V*PF*eff);
  return{I:I,VL:V,Vph:V/Math.sqrt(3),Istart:I*6};
}
function calcBreaker(f){
  var I=N(f.current);if(!pos(I))return null;
  var fm={motor:1.25,general:1.25,welding:2,lighting:1.15};
  var cm={motor:'D',general:'C',welding:'D',lighting:'B'};
  var factor=fm[f.type]||1.25,min=I*factor;
  var STD=[6,10,16,20,25,32,40,50,63,80,100,125,160,200,250,315,400,500,630];
  var sel=STD.filter(function(x){return x>=min;})[0]||STD[STD.length-1];
  var CT=[[1.5,15],[2.5,21],[4,28],[6,36],[10,50],[16,68],[25,89],[35,110],[50,134],[70,171],[95,207],[120,239],[150,275],[185,314],[240,361]];
  var cableArr=CT.filter(function(a){return a[1]>=I*1.25;});
  var cable=cableArr.length?cableArr[0][0]:'>240';
  return{min:min,sel:sel,cable:cable,curve:cm[f.type]||'C',factor:factor};
}
function calcAir(f){
  var P=N(f.pressure),Q=N(f.flow),np=N(f.pistons),Nv=N(f.rpm);
  if(!pos(P)||!pos(Q))return null;
  var kW=(P*1e5*(Q/60))/(1000*0.85),rec=Q*250;
  var disp=(pos(np)&&pos(Nv))?(Q/(np*Nv))*1e6:null;
  return{kW:kW,hp:kW/0.746,rec:rec,disp:disp,pressure:P};
}
function calcPump(f){
  var Q=N(f.flow)/3600,H=N(f.head),eff=N(f.eff)/100,rho=N(f.density);
  if(!pos(Q)||!pos(H)||!(eff>0&&eff<=1)||!pos(rho))return null;
  var Wh=rho*9.81*Q*H,Ws=Wh/eff;
  return{hyd:Wh/1000,shaft:Ws/1000,hp:Ws/746,npsh:Math.max(2,H*0.1+2),head:H};
}
function calcConvert(f){
  var v=N(f.value);if(!Number.isFinite(v)||!f.from||!f.to)return null;
  var T={
    power:{W:1,kW:1000,MW:1e6,HP:746,'HP(m)':735.5,'BTU/h':0.293071},
    torque:{'N.m':1,'kN.m':1000,'kgf.m':9.80665,'lbf.ft':1.35582,'lbf.in':0.112985},
    pressure:{Pa:1,kPa:1000,MPa:1e6,bar:1e5,psi:6894.76,atm:101325,mmHg:133.322},
    flow:{'m3/s':1,'m3/h':1/3600,'L/s':0.001,'L/min':1/60000,GPM:6.309e-5},
    length:{m:1,cm:0.01,mm:0.001,km:1000,ft:0.3048,in:0.0254,yd:0.9144},
  };
  if(f.cat==='temperature'){
    var C=f.from==='degC'?v:f.from==='degF'?(v-32)*5/9:f.from==='K'?v-273.15:null;
    if(C===null)return null;
    var r=f.to==='degC'?C:f.to==='degF'?C*9/5+32:f.to==='K'?C+273.15:null;
    return r!==null?{r:r}:null;
  }
  var tb=T[f.cat];if(!tb||!tb[f.from]||!tb[f.to])return null;
  return{r:v*tb[f.from]/tb[f.to]};
}

// SMART ALERTS
function alert_(cls,msg){return '<div class="smart-alert '+cls+'">'+msg+'</div>';}
function motorAlerts(d){
  if(!d)return '';
  var h='';
  if(d.pf<0.75)h+=alert_('a-warn','⚠️ Facteur de puissance faible — Compensation capacitive recommandée');
  else if(d.pf>=0.92)h+=alert_('a-ok','✅ Excellent facteur de puissance');
  if(d.eff<0.8)h+=alert_('a-warn','⚠️ Rendement faible — Vérifiez l\'état du moteur');
  if(d.Pout_kW>100)h+=alert_('a-info','ℹ️ Grande puissance — Démarrage progressif recommandé');
  return h;
}
function breakerAlerts(d){
  if(!d)return '';
  return alert_('a-ok','✅ Disjoncteur: '+d.sel+' A — Courbe '+d.curve)
        +alert_('a-info','📋 Norme: NF C 15-100 / CEI 60947-2');
}
function airAlerts(d){
  if(!d)return '';
  var h='';
  if(d.pressure>12)h+=alert_('a-danger','🔴 Pression très élevée — Vérifier classe pression réservoir');
  else if(d.pressure>8)h+=alert_('a-warn','⚠️ Pression élevée — Contrôle sécurité obligatoire');
  else h+=alert_('a-ok','✅ Pression nominale — Configuration standard');
  h+=alert_('a-info','💡 Réservoir min recommandé: '+fmt(d.rec,0)+' L');
  return h;
}
function pumpAlerts(d){
  if(!d)return '';
  var h='';
  if(d.head>50)h+=alert_('a-warn','⚠️ HMT élevée — Vérifier NPSH disponible');
  else h+=alert_('a-ok','✅ HMT acceptable pour pompe centrifuge standard');
  h+=alert_('a-info','💡 NPSH estimé: '+fmt(d.npsh,1)+' m — Vérifier avec fabricant');
  return h;
}

// FORMULAS
var FORMULAS={
  motor:[['Puissance apparente (3ph):','S = √3 × U × I [VA]'],['Puissance active:','P = S × cos(φ) [W]'],['Puissance sortie:','Pout = P × η [W]'],['En CV:','CV = Pout / 746']],
  torque:[['Couple (P,n):','T = 9550 × P(kW) / n(tr/min) [N.m]'],['Couple (F,R):','T = F × R [N.m]'],['Conversion:','T(kgf.m) = T(N.m) / 9.81']],
  '3phase':[['Courant nominal:','In = P / (√3 × U × cosφ × η) [A]'],['Tension phase:','Vph = VL / √3 [V]'],['Courant DOL:','Id ≈ 6 × In [A]']],
  breaker:[['Calibre min:','In_disj ≥ 1.25 × In (moteur)'],['Section câble:','Iz ≥ 1.25 × Ib [A]'],['Normes:','NF C 15-100 / CEI 60947-2']],
  air:[['Puissance:','P = (p × Q) / (60 × η) [kW]'],['Réservoir:','V ≥ Q × 250 [L]'],['Déplacement:','Vd = Q / (n × Np) [m3/tour]']],
  pump:[['Puissance hydraulique:','Pu = ρ × g × Q × H [W]'],['Puissance arbre:','Pa = Pu / η [W]'],['NPSH approx.:','NPSHd ≈ 0.1 × H + 2 [m]']],
};
function formulaBox(id){
  var steps=FORMULAS[id];if(!steps)return '';
  return '<div class="formula-box"><div class="formula-title">📐 Formules appliquées</div>'
    +steps.map(function(s,i){return '<div class="formula-step"><div class="step-num">'+(i+1)+'</div><div><div class="step-text">'+s[0]+'</div><div class="step-formula">'+s[1]+'</div></div></div>';}).join('')
    +'</div>';
}

// UI HELPERS
function field(id,label,icon,opts){
  opts=opts||{};
  var type=opts.type||'number',placeholder=opts.placeholder||'',unit=opts.unit||'',options=opts.options||null,value=opts.value||'',min=opts.min||'0',step=opts.step||'any';
  var lbl='<label class="field"><span class="field-label"><span>'+icon+'</span>'+label+'</span>';
  if(options){
    var sel=options.map(function(o){return '<option value="'+o.v+'"'+(o.v===value?' selected':'')+'>'+o.l+'</option>';}).join('');
    return lbl+'<select class="field-input" id="'+id+'" onchange="FC_'+id+'(this.value)">'+sel+'</select></label>';
  }
  return lbl+'<div class="field-ctrl"><input class="field-input" id="'+id+'" type="'+type+'" inputmode="decimal" value="'+value+'" placeholder="'+placeholder+'" min="'+min+'" step="'+step+'" oninput="FC_'+id+'(this.value)"/>'+(unit?'<span class="field-unit">'+unit+'</span>':'')+'</div></label>';
}
function results(items,color,note){
  if(!items)return '<div class="empty-state">Saisissez les valeurs pour afficher les résultats.</div>';
  return '<div class="results" style="background:linear-gradient(180deg,color-mix(in srgb,'+color+' 8%,rgba(15,23,42,1)),rgba(15,23,42,.8));border:1px solid color-mix(in srgb,'+color+' 22%,rgba(148,163,184,.1))">'
    +'<div class="results-hdr"><span class="results-title">Résultats</span><span class="results-note">'+note+'</span></div>'
    +'<div class="res-list">'+items.map(function(it){return '<div class="res-row"><span class="res-label">'+it.icon+' '+it.l+'</span><span class="res-val">'+it.v+'</span></div>';}).join('')+'</div>'
    +'</div>';
}
function tips(icon,txt){return '<div class="tips"><span>'+icon+'</span><span>'+txt+'</span></div>';}
function modeToggle(){
  var ec='mode-btn'+(mode==='engineer'?' eng-active':'');
  var sc='mode-btn'+(mode==='student'?' stu-active':'');
  return '<div class="mode-toggle"><button class="'+ec+'" onclick="setMode(\'engineer\')">🔧 Ingénieur</button><button class="'+sc+'" onclick="setMode(\'student\')">📚 Étudiant</button></div>';
}
function setMode(m){mode=m;renderPanel();}

// CONTENT BUILDERS
function motorContent(){
  var s=state.motor,r=calcMotor(s);
  var items=r?[{icon:'⚡',l:'Puissance apparente',v:fmt(r.S_kVA,3)+' kVA'},{icon:'✅',l:'Puissance active',v:fmt(r.P_kW,3)+' kW'},{icon:'🔋',l:'Puissance sortie',v:fmt(r.Pout_kW,3)+' kW'},{icon:'🐎',l:'Puissance CV',v:fmt(r.hp,2)+' HP'},{icon:'📊',l:'Puissance réactive',v:fmt(r.Q_kVAR,3)+' kVAR'}]:null;

    +'<div class="grid2">'+field('motor_current','Courant','🔌',{placeholder:'10',unit:'A',value:s.current})+field('motor_pf','Facteur puissance','📐',{placeholder:'85',unit:'%',value:s.pf})+'</div>'

function torqueContent(){

function threephaseContent(){
  var s=state['3phase'],r=calc3Phase(s);

    +'<div class="grid2">'+field('3p_pf','Facteur puissance','📐',{placeholder:'85',unit:'%',value:s.pf})+field('3p_eff','Rendement','⚙️',{placeholder:'90',unit:'%',value:s.eff})+'</div>'

function breakerContent(){

}
function airContent(){
  var s=state.air,r=calcAir(s);
  var items=r?[{icon:'💨',l:'Puissance compresseur',v:fmt(r.kW,2)+' kW'},{icon:'🐎',l:'Puissance CV',v:fmt(r.hp,2)+' HP'},{icon:'🗄️',l:'Volume réservoir',v:fmt(r.rec,0)+' L'},{icon:'🔩',l:'Déplacement/piston',v:r.disp?fmt(r.disp,0)+' cc':'--'}]:null;

    +'<div class="grid2">'+field('air_pistons','Nb pistons','🔩',{placeholder:'2',value:s.pistons,step:'1',min:'1'})+field('air_rpm','Vitesse rotation','🌀',{placeholder:'900',unit:'tr/min',value:s.rpm,step:'1'})+'</div>'
    +tips('ℹ️','Rendement estimé 85%. Règle réservoir: 250 L par m3/min.')
    +results(items,'#10b981','ISO 1217')+(r?airAlerts(r):'')+'</div>';
}
function pumpContent(){
  var s=state.pump,r=calcPump(s);
  var items=r?[{icon:'💧',l:'Puissance hydraulique',v:fmt(r.hyd,2)+' kW'},{icon:'⚙️',l:'Puissance arbre',v:fmt(r.shaft,2)+' kW'},{icon:'🐎',l:'Puissance CV',v:fmt(r.hp,2)+' HP'},{icon:'📏',l:'NPSH approx.',v:fmt(r.npsh,1)+' m'}]:null;
  return '<div class="stack">'+(mode==='student'?formulaBox('pump'):'')

    +'<div class="grid2">'+field('pump_eff','Rendement pompe','⚙️',{placeholder:'75',unit:'%',value:s.eff})+field('pump_density','Densité fluide','⚗️',{placeholder:'1000',unit:'kg/m3',value:s.density})+'</div>'
    +tips('ℹ️','NPSH approx. Vérifiez avec données fabricant.')
    +results(items,'#f97316','ISO 9906')+(r?pumpAlerts(r):'')+'</div>';

function convertContent(){
  var cv=state.convert;
  var catOpts=[{v:'power',l:'⚡ Puissance'},{v:'torque',l:'🔧 Couple'},{v:'pressure',l:'💪 Pression'},{v:'flow',l:'💧 Débit'},{v:'length',l:'📏 Longueur'},{v:'temperature',l:'🌡 Température'}];
  var unitOpts=(UNITS[cv.cat]||[]).map(function(u){return{v:u,l:u};});
  var r=calcConvert(cv);
  var items=r?[{icon:'🔄',l:'Valeur convertie',v:fmt(r.r,4)+' '+cv.to}]:null;
  return '<div class="stack">'
    +field('cv_cat','Catégorie','🔄',{options:catOpts,value:cv.cat})
    +field('cv_value','Valeur','🔢',{placeholder:'100',value:cv.value})
    +'<div class="grid2">'+field('cv_from','De','↗',{options:unitOpts,value:cv.from})+field('cv_to','Vers','↙',{options:unitOpts,value:cv.to})+'</div>'
    +results(items,'#ec4899','Coefficients ISO/SI')+'</div>';
}
function aiContent(){
  var msgs=chatMsgs.map(function(m){
    if(m.typing)return '<div class="msg-ai"><div class="av-ai">AI</div><div class="bbl-ai"><div class="typing-dots"><div class="dot" style="animation-delay:0s"></div><div class="dot" style="animation-delay:.2s"></div><div class="dot" style="animation-delay:.4s"></div></div></div></div>';
    if(m.role==='user')return '<div class="msg-user"><div class="av-user">N</div><div class="bbl-user">'+esc(m.text)+'</div></div>';
    return '<div class="msg-ai"><div class="av-ai">AI</div><div class="bbl-ai">'+esc(m.text)+'</div></div>';
  }).join('');
  var showSug=chatMsgs.length<=1;
  return '<div class="ai-container">'
    +'<div class="ai-header"><div class="ai-badge"><div class="ai-dot"></div>Assistant IA Electromécanique</div><div class="ai-status">Précis · Professionnel</div></div>'
    +'<div class="chat-msgs" id="chatMsgs">'+msgs+'</div>'
    +(showSug?'<div class="suggestions"><div class="sug-title">Questions fréquentes:</div><div class="sug-grid">'
      +'<button class="sug-btn" onclick="setSug(0)">'+SUGS[0]+'</button>'
      +'<button class="sug-btn" onclick="setSug(1)">'+SUGS[1]+'</button>'
      +'<button class="sug-btn" onclick="setSug(2)">'+SUGS[2]+'</button>'
      +'<button class="sug-btn" onclick="setSug(3)">'+SUGS[3]+'</button>'
      +'</div></div>':'')
    +'<div class="chat-composer"><input class="chat-input" id="chatInput" placeholder="Posez votre question technique..." onkeydown="if(event.key===\'Enter\')sendChat()"/>'
    +'<button class="send-btn" id="sendBtn" onclick="sendChat()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button></div>'
    +'<div class="ai-footer">Powered by Claude AI · Développé par Kouadria Nadir</div>'
    +'</div>';
}

function setSug(i){var inp=document.getElementById('chatInput');if(inp){inp.value=SUGS[i];inp.focus();}}

function buildContent(){
  var m={motor:motorContent,torque:torqueContent,'3phase':threephaseContent,breaker:breakerContent,air:airContent,pump:pumpContent,convert:convertContent,ai:aiContent};
  return(m[activeTab]||motorContent)();
}

function renderTabs(){
  document.getElementById('tabs').innerHTML=TABS.map(function(t){
    var sel=t.id===activeTab;
    return '<button class="tab-btn'+(sel?' active':'')+'" onclick="setTab(\''+t.id+'\')" style="'+(sel?'background:color-mix(in srgb,'+t.color+' 14%,rgba(15,23,42,1));border:1.5px solid color-mix(in srgb,'+t.color+' 40%,transparent)':'')+'"><span class="ticon" style="color:'+(sel?t.color:'#64748b')+'">'+t.icon+'</span><span class="tlbl" style="color:'+(sel?t.color:'#64748b')+'">'+t.label+'</span></button>';
  }).join('');
}

function renderPanel(){
  var t=TABS.filter(function(x){return x.id===activeTab;})[0]||TABS[0];
  var panel=document.getElementById('panel');
  panel.style.border='1px solid color-mix(in srgb,'+t.color+' 22%,rgba(148,163,184,.1))';
  panel.style.boxShadow='0 16px 40px color-mix(in srgb,'+t.color+' 10%,rgba(2,8,23,.5))';
  panel.innerHTML='<div class="panel-hdr"><div class="panel-icon" style="background:color-mix(in srgb,'+t.color+' 12%,rgba(15,23,42,1));border:1px solid color-mix(in srgb,'+t.color+' 22%,transparent)">'+t.icon+'</div><div><h2>'+t.label+'</h2><p>'+t.help+'</p></div></div>'
    +(activeTab!=='ai'&&activeTab!=='convert'?modeToggle():'')
    +buildContent();
  bindInputs();
  if(activeTab==='ai')scrollChat();
}

function setTab(id){activeTab=id;renderTabs();renderPanel();}

function bindInputs(){
  var m=state.motor,t=state.torque,tp=state['3phase'],br=state.breaker,air=state.air,p=state.pump,cv=state.convert;
  window.FC_motor_phases=function(v){m.phases=v;renderPanel();};
  window.FC_motor_voltage=function(v){m.voltage=v;renderPanel();};
  window.FC_motor_current=function(v){m.current=v;renderPanel();};
  window.FC_motor_pf=function(v){m.pf=v;renderPanel();};
  window.FC_motor_eff=function(v){m.eff=v;renderPanel();};
  window.FC_torque_type=function(v){t.type=v;renderPanel();};
  window.FC_torque_power=function(v){t.power=v;renderPanel();};
  window.FC_torque_rpm=function(v){t.rpm=v;renderPanel();};
  window.FC_torque_force=function(v){t.force=v;renderPanel();};
  window.FC_torque_radius=function(v){t.radius=v;renderPanel();};
  window.FC_3p_power=function(v){tp.power=v;renderPanel();};
  window.FC_3p_voltage=function(v){tp.voltage=v;renderPanel();};
  window.FC_3p_pf=function(v){tp.pf=v;renderPanel();};
  window.FC_3p_eff=function(v){tp.eff=v;renderPanel();};
  window.FC_br_current=function(v){br.current=v;renderPanel();};
  window.FC_br_type=function(v){br.type=v;renderPanel();};
  window.FC_air_pressure=function(v){air.pressure=v;renderPanel();};
  window.FC_air_flow=function(v){air.flow=v;renderPanel();};
  window.FC_air_pistons=function(v){air.pistons=v;renderPanel();};
  window.FC_air_rpm=function(v){air.rpm=v;renderPanel();};
  window.FC_pump_flow=function(v){p.flow=v;renderPanel();};
  window.FC_pump_head=function(v){p.head=v;renderPanel();};
  window.FC_pump_eff=function(v){p.eff=v;renderPanel();};
  window.FC_pump_density=function(v){p.density=v;renderPanel();};
  window.FC_cv_cat=function(v){cv.cat=v;var u=UNITS[v]||[];cv.from=u[0];cv.to=u[1]||u[0];renderPanel();};
  window.FC_cv_value=function(v){cv.value=v;renderPanel();};
  window.FC_cv_from=function(v){cv.from=v;renderPanel();};
  window.FC_cv_to=function(v){cv.to=v;renderPanel();};
}

function scrollChat(){var c=document.getElementById('chatMsgs');if(c)c.scrollTop=c.scrollHeight;}
function renderChatOnly(){
  var c=document.getElementById('chatMsgs');if(!c)return;
  c.innerHTML=chatMsgs.map(function(m){
    if(m.typing)return '<div class="msg-ai"><div class="av-ai">AI</div><div class="bbl-ai"><div class="typing-dots"><div class="dot" style="animation-delay:0s"></div><div class="dot" style="animation-delay:.2s"></div><div class="dot" style="animation-delay:.4s"></div></div></div></div>';
    if(m.role==='user')return '<div class="msg-user"><div class="av-user">N</div><div class="bbl-user">'+esc(m.text)+'</div></div>';
    return '<div class="msg-ai"><div class="av-ai">AI</div><div class="bbl-ai">'+esc(m.text)+'</div></div>';
  }).join('');
  scrollChat();
}

async function sendChat(){
  var inp=document.getElementById('chatInput');
  var btn=document.getElementById('sendBtn');
  if(!inp)return;
  var txt=inp.value.trim();
  if(!txt||loading)return;
  inp.value='';
  chatMsgs.push({role:'user',text:txt});
  chatMsgs.push({role:'ai',text:'',typing:true});
  loading=true;
  if(btn)btn.disabled=true;
  renderChatOnly();
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:600,
        system:'Ingenieur electromecanicien expert. Repondez en francais technique. Max 4 paragraphes. Donnez formules avec unites. Citez normes si pertinent. Soyez precis et pratique. App par Kouadria Nadir.',
        messages:[{role:'user',content:txt}]
      })
    });
    var data=await res.json();
    var reply=data.content?data.content.map(function(c){return c.text||'';}).join(''):'Erreur de reponse.';
    chatMsgs.splice(chatMsgs.findIndex(function(m){return m.typing;}),1);
    chatMsgs.push({role:'ai',text:reply});
  }catch(e){
    chatMsgs.splice(chatMsgs.findIndex(function(m){return m.typing;}),1);
    chatMsgs.push({role:'ai',text:'Connexion impossible. Verifiez votre connexion et reessayez.'});
  }
  loading=false;
  if(btn)btn.disabled=false;
  renderChatOnly();
}

renderTabs();
renderPanel();
</script>
